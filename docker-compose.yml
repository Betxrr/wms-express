version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wms-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: wms_express
    ports:
      - "5432:5432"
    volumes:
      - wms-db-data:/var/lib/postgresql/data

volumes:
  wms-db-data: